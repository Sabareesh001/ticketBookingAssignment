<!DOCTYPE html>
<html>
<head>
    <title>Test Operator Endpoints</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; }
        textarea { width: 100%; height: 100px; }
    </style>
</head>
<body>
    <h1>Operator Endpoints Tester</h1>
    
    <div>
        <label>Operator Token:</label><br>
        <textarea id="tokenInput" placeholder="Paste your operator_auth_token here"></textarea><br>
        <button onclick="loadTokenFromStorage()">Load from localStorage</button>
        <button onclick="testAllEndpoints()">Test All Endpoints</button>
    </div>
    
    <div id="results"></div>

    <script>
        function loadTokenFromStorage() {
            const token = localStorage.getItem('operator_auth_token');
            if (token) {
                document.getElementById('tokenInput').value = token;
                addResult('Token loaded from localStorage', 'info');
                
                // Parse and show token info
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const exp = new Date(payload.exp * 1000);
                    const now = new Date();
                    const isExpired = now >= exp;
                    
                    addResult(`Token Info:
- Operator ID: ${payload.nameid || payload.sub}
- Name: ${payload.unique_name || payload.name}
- Email: ${payload.email}
- Expires: ${exp.toLocaleString()}
- Status: ${isExpired ? 'EXPIRED' : 'VALID'}`, isExpired ? 'error' : 'success');
                } catch (e) {
                    addResult('Error parsing token: ' + e.message, 'error');
                }
            } else {
                addResult('No token found in localStorage', 'error');
            }
        }

        async function testAllEndpoints() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                addResult('Please enter a token first', 'error');
                return;
            }

            const endpoints = [
                { name: 'Locations', url: 'http://localhost:5266/api/operator-dashboard/locations' },
                { name: 'Routes', url: 'http://localhost:5266/api/operator-dashboard/routes' },
                { name: 'Available Locations', url: 'http://localhost:5266/api/operator-dashboard/available-locations' }
            ];

            for (const endpoint of endpoints) {
                await testEndpoint(endpoint.name, endpoint.url, token);
            }
        }

        async function testEndpoint(name, url, token) {
            try {
                addResult(`Testing ${name}...`, 'info');
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ ${name} SUCCESS (${response.status}): ${JSON.stringify(data, null, 2)}`, 'success');
                } else {
                    const errorText = await response.text();
                    addResult(`❌ ${name} FAILED (${response.status}): ${errorText}`, 'error');
                }
            } catch (error) {
                addResult(`❌ ${name} ERROR: ${error.message}`, 'error');
            }
        }

        function addResult(message, type) {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<pre>${message}</pre>`;
            document.getElementById('results').appendChild(div);
        }

        // Auto-load token on page load
        window.onload = loadTokenFromStorage;
    </script>
</body>
</html>
