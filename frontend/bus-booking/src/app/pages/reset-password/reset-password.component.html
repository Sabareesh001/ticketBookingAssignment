<div class="reset-password-container">
  <div class="reset-password-card">
    <h1>Reset Password</h1>

    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <div *ngIf="success" class="alert alert-success">
      {{ success }}
    </div>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          formControlName="newPassword"
          class="form-control"
          [class.is-invalid]="submitted && f['newPassword'].errors"
          placeholder="Enter new password"
        />
        <div *ngIf="submitted && f['newPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['newPassword'].errors['required']">Password is required</div>
          <div *ngIf="f['newPassword'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          class="form-control"
          [class.is-invalid]="submitted && (f['confirmPassword'].errors || resetPasswordForm.errors?.['passwordMismatch'])"
          placeholder="Confirm password"
        />
        <div *ngIf="submitted && (f['confirmPassword'].errors || resetPasswordForm.errors?.['passwordMismatch'])" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors?.['required']">Confirm password is required</div>
          <div *ngIf="resetPasswordForm.errors?.['passwordMismatch']">Passwords do not match</div>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading"
      >
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <div class="auth-links">
      <p><a routerLink="/login">Back to Login</a></p>
    </div>
  </div>
</div>
